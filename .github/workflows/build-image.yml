name: Build Image

on:
  workflow_call:
    inputs:
      frp_version:
        description: frp version to build
        required: true
        type: string
      tags:
        description: Docker tags (newline-separated)
        required: true
        type: string
      push:
        description: Push image to registry
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build, test, and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect latest stable Go and Alpine versions
        id: versions
        run: |
          GO_VERSION=$(curl -sL 'https://go.dev/VERSION?m=text' | head -1 | sed 's/^go//')
          ALPINE_VERSION=$(curl -s 'https://registry.hub.docker.com/v2/repositories/library/alpine/tags?page_size=100&ordering=last_updated' | jq -r '[.results[].name | select(test("^[0-9]+\\.[0-9]+$"))] | sort_by(split(".") | map(tonumber)) | last')
          echo "go=$GO_VERSION" >> "$GITHUB_OUTPUT"
          echo "alpine=$ALPINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using Go $GO_VERSION, Alpine $ALPINE_VERSION"

      - name: Build test image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: frp-bunny:test
          build-args: |
            FRP_VERSION=${{ inputs.frp_version }}
            GO_VERSION=${{ steps.versions.outputs.go }}
            ALPINE_VERSION=${{ steps.versions.outputs.alpine }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration tests
        working-directory: example
        run: ./run.sh --no-build

      - name: Build and push (multi-platform)
        if: inputs.push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ inputs.tags }}
          build-args: |
            FRP_VERSION=${{ inputs.frp_version }}
            GO_VERSION=${{ steps.versions.outputs.go }}
            ALPINE_VERSION=${{ steps.versions.outputs.alpine }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Lowercase image name
        id: image
        if: inputs.push
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        if: inputs.push
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ inputs.frp_version }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
