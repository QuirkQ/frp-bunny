# Integration test and example for frp-bunny (server + client mode)
#
# Simulates the full production chain with mTLS and real DNS:
#   browser → DNS → frps (SNI routing) → frpc (mTLS tunnel) → Caddy (TLS termination) → app
#
# Three isolated networks with static IPs:
#   public  172.20.0.0/24 — internet-facing (DNS, frps, test client)
#   tunnel  172.20.1.0/24 — frp control plane (frps ↔ frpc, mTLS)
#   backend 172.20.2.0/24 — client-side LAN (frpc, Caddy, app)
#
# Usage:
#   ./run.sh          — generate certs, build, test
#   ./run.sh --no-build  — skip image build (use existing frp-bunny:test)

x-frp: &frp
  image: ${FRP_IMAGE:-frp-bunny:test}
  build:
    context: ..

x-dns: &dns
  dns: [172.20.0.2]

services:
  # ── DNS (resolves *.test.internal → frps) ──────────────────────
  dns:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./dns/Corefile:/etc/coredns/Corefile:ro
    networks:
      public:
        ipv4_address: 172.20.0.2

  # ── frps (server) ──────────────────────────────────────────────
  server:
    <<: *frp
    environment:
      FRP_TOKEN: test-token-do-not-use-in-production
      TLS_CERT_FILE: /certs/server.crt
      TLS_KEY_FILE: /certs/server.key
      TLS_CA_FILE: /certs/ca.crt
    volumes:
      - certs:/certs:ro
    networks:
      public:
        ipv4_address: 172.20.0.10
      tunnel:
        ipv4_address: 172.20.1.10

  # ── frpc (client) ──────────────────────────────────────────────
  client:
    <<: *frp
    depends_on:
      server:
        condition: service_healthy
    environment:
      FRP_MODE: client
      FRP_TOKEN: test-token-do-not-use-in-production
      SERVER_ADDR: 172.20.1.10
      PROXY_PROTOCOL_VERSION: v2
      TLS_CERT_FILE: /certs/client.crt
      TLS_KEY_FILE: /certs/client.key
      TLS_CA_FILE: /certs/ca.crt
      TLS_SERVER_NAME: frps
    volumes:
      - certs:/certs:ro
      - ./proxies.toml:/etc/frp/conf.d/proxies.toml:ro
    networks:
      tunnel:
        ipv4_address: 172.20.1.20
      backend:
        ipv4_address: 172.20.2.20

  # ── Caddy (TLS termination + reverse proxy) ────────────────────
  # Uses internal CA for self-signed certs in this test environment.
  # In production, remove "tls internal" and Caddy uses Let's Encrypt.
  caddy:
    image: caddy:2-alpine
    <<: *dns
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      backend:
        ipv4_address: 172.20.2.30

  # ── Backend app ─────────────────────────────────────────────────
  app:
    image: nginx:alpine
    networks:
      backend:
        ipv4_address: 172.20.2.40

  # ── Integration test runner ─────────────────────────────────────
  test:
    image: alpine:3.23
    <<: *dns
    depends_on:
      client:
        condition: service_healthy
    entrypoint: ["sh", "/test.sh"]
    volumes:
      - ./test.sh:/test.sh:ro
    networks:
      public:
        ipv4_address: 172.20.0.100

networks:
  public:
    ipam:
      config:
        - subnet: 172.20.0.0/24
  tunnel:
    ipam:
      config:
        - subnet: 172.20.1.0/24
  backend:
    ipam:
      config:
        - subnet: 172.20.2.0/24

volumes:
  certs:
    name: example_certs
    external: true
  caddy_data:
